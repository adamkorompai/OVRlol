<div [class]="compact ? 'search search--compact' : 'search'">
  @if (showLabel) {
    <label class="search__label">{{ label }}</label>
  }

  <form class="search__row" (submit)="$event.preventDefault(); searchPlayer();">
    <input
      type="text"
      [(ngModel)]="gameName"
      name="gameName"
      [placeholder]="gamePlaceholder"
      class="search__input"
    />

    <div class="search__hash">#</div>

    <input
      type="text"
      [(ngModel)]="tagLine"
      name="tagLine"
      [placeholder]="tagPlaceholder"
      class="search__input search__input--tag"
    />

    <button
      type="submit"
      [disabled]="isLoading() || !gameName || !tagLine"
      class="search__button"
      [attr.aria-label]="buttonLabel"
      [attr.title]="buttonLabel"
    >
      @if (isLoading()) {
        <span class="search__loading-dot"></span>
      } @else {
        <svg class="search__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
          <path d="M20 20L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      }
    </button>
  </form>

  @if (errorMessage()) {
    <p class="search__error">{{ errorMessage() }}</p>
  }
</div>
